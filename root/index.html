<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>NanoTrend Vanguard Portal</title>
    <!-- Stlite CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.58.0/build/stlite.css" />
  </head>
  <body>
    <!-- Container where the app will be rendered -->
    <div id="stlite"></div>

    <!-- Stlite Library -->
    <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.58.0/build/stlite.js"></script>
    <script>
      stlite.mount(
        {
          // Required libraries based on the sources [6-8]
          requirements: ["pandas", "pyvis", "scikit-learn", "xgboost", "networkx"],
          entrypoint: "app.py",
          files: {
            "app.py": {
              url: "app.py", // We will build the logic for this file in subsequent steps [1, 2]
            },
          },
        },
        document.getElementById("stlite")
      );
    </script>
  </body>
</html>
