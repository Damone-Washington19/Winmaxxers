<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>NanoTrend Vanguard Portal</title>
    <!-- Stlite CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.58.0/build/stlite.css" />
  </head>
  <body>
    <!-- Container where the app will be rendered -->
    <div id="stlite"></div>

    <!-- Stlite Library -->
    <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.58.0/build/stlite.js"></script>
    <script>
      stlite.mount(
      {
        requirements: ["pandas", "pyvis", "scikit-learn", "xgboost", "networkx"],
        entrypoint: "app.py",
        files: {
          "app.py": {
            url: "app.py",
          },
          // ADD THIS SECTION TO VIRTUALIZE YOUR DATA FOLDER
          "data/forecast_results.csv": {
            url: "data/forecast_results.csv",
          },
        },
      },
      document.getElementById("stlite")
    );
    </script>
  </body>
</html>
